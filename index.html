<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>순서 정하기 핀볼 🎱 — 마블 레이스</title>
<style>
  :root{
    --cream:#F7F3EA; --cream2:#EFE8D8; --ink:#2E2A24; --ink-soft:#7A7063;
    --clay:#D97757; --clay-dark:#C15F3F; --line:#E0D8C7; --gold:#E4A951; --track:#E7DcC6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:radial-gradient(130% 80% at 50% -10%,#FDFAF3 0%,var(--cream) 50%,var(--cream2) 100%);
    color:var(--ink); min-height:100vh; display:flex; justify-content:center; padding:20px 12px 56px;
  }
  .wrap{width:100%;max-width:520px}
  header{text-align:center;margin-bottom:14px}
  h1{font-family:Georgia,"Times New Roman",serif;font-size:29px;margin:0;letter-spacing:-.6px}
  h1 .em{color:var(--clay)}
  .sub{color:var(--ink-soft);font-size:13.5px;margin-top:5px}
  .card{background:rgba(255,255,255,.74);border:1px solid var(--line);border-radius:20px;padding:18px;
    box-shadow:0 10px 30px -20px rgba(46,42,36,.55);backdrop-filter:blur(6px)}
  .modes{display:flex;gap:8px;background:var(--cream2);padding:5px;border-radius:13px;margin-bottom:14px}
  .modes button{flex:1;border:none;background:transparent;padding:10px 6px;border-radius:10px;font-size:14px;
    font-weight:700;color:var(--ink-soft);cursor:pointer;transition:.18s}
  .modes button.on{background:#fff;color:var(--clay-dark);box-shadow:0 2px 8px -4px rgba(0,0,0,.25)}
  label.fld{display:block;font-size:13px;font-weight:700;color:var(--ink-soft);margin:0 0 6px 2px}
  input[type=number],textarea{width:100%;border:1.5px solid var(--line);border-radius:13px;padding:12px 14px;
    font-size:16px;font-family:inherit;background:#fff;color:var(--ink);resize:none}
  input:focus,textarea:focus{outline:none;border-color:var(--clay)}
  .hint{font-size:12px;color:var(--ink-soft);margin:6px 2px 0}
  .row{display:flex;gap:10px;align-items:center;margin-top:14px}
  .go{flex:1;border:none;border-radius:15px;padding:15px;cursor:pointer;
    background:linear-gradient(180deg,var(--clay),var(--clay-dark));color:#fff;font-size:17px;font-weight:800;
    letter-spacing:-.3px;box-shadow:0 12px 24px -12px var(--clay);transition:.15s}
  .go:active{transform:translateY(1px)}
  .ghost{border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);border-radius:15px;
    padding:15px 16px;font-size:15px;font-weight:700;cursor:pointer}
  #stage{display:none;margin-top:16px}
  .board-wrap{position:relative;border-radius:20px;overflow:hidden;border:1px solid var(--line);
    box-shadow:0 16px 34px -22px rgba(46,42,36,.65)}
  canvas{display:block;width:100%;height:auto;background:linear-gradient(180deg,#FBF7EE,#F0E7D6)}
  #results{display:none;margin-top:16px}
  .res-head{text-align:center;margin-bottom:12px}
  .res-head h2{margin:0;font-family:Georgia,serif;font-size:23px}
  .res-head p{margin:5px 0 0;color:var(--ink-soft);font-size:13px}
  .rank{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:14px;margin-bottom:8px;
    background:#fff;border:1px solid var(--line);animation:pop .38s cubic-bezier(.2,1.3,.4,1) both}
  @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.95)}to{opacity:1;transform:none}}
  .rank .medal{font-size:22px;width:38px;text-align:center;flex:none;font-weight:800}
  .rank .who{font-weight:800;font-size:16px}
  .rank .cmt{color:var(--ink-soft);font-size:12.5px;margin-top:1px}
  .rank .body{flex:1;min-width:0}
  .rank .swatch{width:13px;height:13px;border-radius:5px;flex:none;box-shadow:0 0 0 2px #fff inset}
  .rank.top1{background:linear-gradient(90deg,#FFF4DC,#FFFDF8);border-color:#EDD59B}
  .foot{text-align:center;margin-top:16px;color:var(--ink-soft);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>순서 정하기 <span class="em">핀볼</span> 🎱</h1>
    <div class="sub">마블들이 트랙을 질주하며 순서를 정합니다. 실력? 그런 거 없어요.</div>
  </header>

  <div class="card" id="setup">
    <div class="modes">
      <button id="mNum" class="on" onclick="setMode('num')">🔢 숫자 (인원수)</button>
      <button id="mName" onclick="setMode('name')">✍️ 이름 입력</button>
    </div>
    <div id="numPane">
      <label class="fld">몇 명 / 몇 개의 순서를 정할까요?</label>
      <input type="number" id="count" min="2" max="24" value="6">
      <div class="hint">2 ~ 24. 마블에 1번부터 번호가 붙어요.</div>
    </div>
    <div id="namePane" style="display:none">
      <label class="fld">이름을 줄바꿈으로 입력하세요</label>
      <textarea id="names" rows="5" placeholder="성준&#10;민지&#10;영수&#10;지훈"></textarea>
      <div class="hint">한 줄에 한 명. 2~24명까지.</div>
    </div>
    <div class="row">
      <button class="go" id="startBtn" onclick="start()">레이스 시작! 🏁</button>
      <button class="ghost" id="soundBtn" onclick="toggleSound()">🔈 소리</button>
    </div>
  </div>

  <div id="stage">
    <div class="board-wrap">
      <canvas id="cv" width="460" height="720"></canvas>
    </div>
    <div class="row"><button class="ghost" style="flex:1" onclick="reset()">⏹ 그만두고 설정으로</button></div>
  </div>

  <div id="results" class="card">
    <div class="res-head">
      <h2 id="resTitle">🏁 최종 순위</h2>
      <p id="resSub"></p>
    </div>
    <div id="rankList"></div>
    <div class="row">
      <button class="go" onclick="again()">🔁 한 번 더!</button>
      <button class="ghost" onclick="reset()">⚙️ 설정 바꾸기</button>
    </div>
  </div>

  <div class="foot">진짜 물리엔진(Matter.js)으로 굴러가는 마블 레이스 · 매번 결과가 다르고, 완전 무작위·완전 공정</div>
</div>

<script src="matter.min.js"></script>
<script>
/* ===================== SETUP / CONST ===================== */
const CV=document.getElementById('cv'), ctx=CV.getContext('2d');
const VW=CV.width, VH=CV.height;                 // viewport (screen) size
const WORLD_W=520;
const SCALE=VW/WORLD_W;                            // world -> screen
const VIS_H=VH/SCALE;                              // visible world height
const setupEl=id=>document.getElementById(id);
const elSetup=setupEl('setup'), elStage=setupEl('stage'), elResults=setupEl('results');
const elNumPane=setupEl('numPane'), elNamePane=setupEl('namePane'), elMNum=setupEl('mNum'), elMName=setupEl('mName');

let mode='num', soundOn=false;
let course=null, marbles=[], finishOrder=[], labels=[], colors=[], running=false, raf=null, startTime=0;
let camY=0, camTarget=0, sparks=[], confetti=[], commentary=[], lastLeader=-1, floaters=[];

const PALETTE=['#D97757','#5B8C7B','#E4A951','#7B6CA6','#4F8FBF','#C15F8F','#6FA86A','#D98C4A',
  '#8A7FD9','#5FA9A0','#CC6666','#8FA84F','#B07FB0','#C99A3F','#5D7FB0','#A86F5F',
  '#6FA8C9','#B05F7F','#7FA85F','#C97F5F','#5FA87F','#A85F9F','#5F7FA8','#A8905F'];

/* ===================== INPUT ===================== */
function setMode(m){
  mode=m;
  elMNum.classList.toggle('on',m==='num'); elMName.classList.toggle('on',m==='name');
  elNumPane.style.display=m==='num'?'':'none'; elNamePane.style.display=m==='name'?'':'none';
}
function getLabels(){
  if(mode==='num'){
    let n=parseInt(setupEl('count').value,10); if(isNaN(n))n=0;
    n=Math.max(0,Math.min(24,n));
    return Array.from({length:n},(_,i)=>String(i+1));
  }
  return setupEl('names').value.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,24);
}

/* ===================== SOUND ===================== */
let actx=null, lastHit=0;
function toggleSound(){
  soundOn=!soundOn;
  setupEl('soundBtn').textContent=soundOn?'🔊 소리 ON':'🔈 소리';
  if(soundOn&&!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
}
function tone(f,d=0.05,v=0.04,type='sine'){
  if(!soundOn||!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);
  o.start();g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+d);o.stop(actx.currentTime+d);
}

/* ===================== TRACK (verified headless) ===================== */
function makeCourse(n){
  const M=Matter,{Engine,Composite,Bodies,Body}=M;
  const engine=Engine.create(); engine.gravity.y=1; engine.enableSleeping=false;
  const world=engine.world;
  const wo={isStatic:true,restitution:0.2,friction:0.02};
  const walls=[], spinners=[], rampSegs=[];
  function bar(x1,y1,x2,y2,th=16){
    const cx=(x1+x2)/2,cy=(y1+y2)/2,len=Math.hypot(x2-x1,y2-y1),ang=Math.atan2(y2-y1,x2-x1);
    return Bodies.rectangle(cx,cy,len,th,{...wo,angle:ang});
  }
  const W=WORLD_W, LEVELS=9, LEVEL_H=250, TOP=220, MARGIN=44, GAP=130, DROP=160;
  for(let L=0;L<LEVELS;L++){
    const topY=TOP+L*LEVEL_H, rightward=(L%2===0);
    let x1,y1,x2,y2;
    if(rightward){x1=MARGIN;y1=topY;x2=W-MARGIN-GAP;y2=topY+DROP;}
    else{x1=W-MARGIN;y1=topY;x2=MARGIN+GAP;y2=topY+DROP;}
    walls.push(bar(x1,y1,x2,y2,16)); rampSegs.push([x1,y1,x2,y2,'ramp']);
    walls.push(bar(x1,y1-30,x1,y1-2,10)); rampSegs.push([x1,y1-30,x1,y1-2,'lip']);
  }
  const H=TOP+LEVELS*LEVEL_H+280;
  walls.push(Bodies.rectangle(-8,H/2,16,H*1.2,wo));
  walls.push(Bodies.rectangle(W+8,H/2,16,H*1.2,wo));
  const goalY=TOP+LEVELS*LEVEL_H+140;
  walls.push(bar(0,goalY-60,W/2-70,goalY+40,16)); rampSegs.push([0,goalY-60,W/2-70,goalY+40,'ramp']);
  walls.push(bar(W,goalY-60,W/2+70,goalY+40,16)); rampSegs.push([W,goalY-60,W/2+70,goalY+40,'ramp']);
  const FINISH=goalY+80;

  function spinner(cx,cy,arm,sp){
    const ps=[];for(let i=0;i<3;i++){const a=(Math.PI*2/3)*i;ps.push(Bodies.rectangle(cx+Math.cos(a)*arm/2,cy+Math.sin(a)*arm/2,arm,9,{angle:a}));}
    ps.push(Bodies.circle(cx,cy,10));
    const b=Body.create({parts:ps,isStatic:true,restitution:0.4,friction:0.02});b.cx=cx;b.cy=cy;b.arm=arm;
    return {b,sp,ang:0};
  }
  [[195,742,84,0.08],[325,992,84,-0.08],[325,1492,84,0.08],[325,1992,84,-0.08]]
    .forEach(s=>spinners.push(spinner(s[0],s[1],s[2],s[3])));

  Composite.add(world,walls);
  Composite.add(world,spinners.map(s=>s.b));

  const R=n>16?11:(n>10?12:13);
  const mb=[];
  for(let i=0;i<n;i++){
    const body=Bodies.circle(MARGIN+20+Math.random()*(W-2*MARGIN-40),40-(i%6)*30-Math.random()*20,R,
      {restitution:0.28,friction:0.02,frictionAir:0.006,density:0.002,label:'m'+i});
    body.idx=i; mb.push({body,idx:i,r:R,done:false,bestY:-1e9,noProg:0});
  }
  Composite.add(world,mb.map(o=>o.body));

  // collision sparks + hit sounds
  M.Events.on(engine,'collisionStart',ev=>{
    for(const p of ev.pairs){
      const a=p.bodyA,b=p.bodyB;
      const mv=(a.label&&a.label[0]==='m')?a:((b.label&&b.label[0]==='m')?b:null);
      if(!mv) continue;
      const v=Math.hypot(mv.velocity.x,mv.velocity.y);
      if(v>3){
        sparks.push({x:mv.position.x,y:mv.position.y,vx:(Math.random()-.5)*2,vy:-Math.random()*2,life:14,c:'#fff'});
        const now=performance.now();
        if(now-lastHit>28){ tone(300+Math.random()*400,0.03,0.02); lastHit=now; }
      }
    }
  });
  return {engine,world,walls,spinners,marbles:mb,rampSegs,W,H,FINISH,goalY,R};
}

/* ===================== START / LOOP ===================== */
function start(){
  labels=getLabels();
  if(labels.length<2){alert('최소 2명(개) 이상 입력해주세요 🙏');return;}
  colors=labels.map((_,i)=>PALETTE[i%PALETTE.length]);
  finishOrder=[]; sparks=[]; confetti=[]; floaters=[]; commentary=[]; lastLeader=-1;
  elSetup.style.display='none'; elResults.style.display='none'; elStage.style.display='block';
  course=makeCourse(labels.length); marbles=course.marbles;
  camY=0; camTarget=0; running=true; startTime=performance.now();
  say(pick(START_LINES));
  cancelAnimationFrame(raf); loop();
}

function say(msg){ commentary.push({t:msg,at:performance.now()}); if(commentary.length>4) commentary.shift(); }

function loop(){
  const M=Matter,{Engine,Body,Composite}=M;
  for(const s of course.spinners){ Body.rotate(s.b,s.sp); s.ang+=s.sp; }
  Engine.update(course.engine,1000/60);

  // progress + anti-stuck + finish
  for(const o of marbles){
    if(o.done) continue;
    const b=o.body;
    if(b.position.y>o.bestY+2){o.bestY=b.position.y;o.noProg=0;}
    else{o.noProg++; if(o.noProg>80){Body.setVelocity(b,{x:(Math.random()-0.5)*7,y:4+Math.random()*4});o.noProg=0;}}
    if(b.position.y>course.FINISH || b.position.y>course.H+160){
      o.done=true; finishOrder.push(o.idx);
      Composite.remove(course.world,b);
      const rank=finishOrder.length;
      floaters.push({txt:`${rank}등 ${labels[o.idx]}!`,x:b.position.x,y:course.FINISH-20,life:70,c:colors[o.idx]});
      burstConfetti();
      tone(560+rank*24,0.12,0.05,'triangle');
      say(arrivalLine(rank,labels.length,labels[o.idx]));
    }
  }

  // leader change commentary
  const act=marbles.filter(o=>!o.done);
  if(act.length){
    let lead=act[0]; for(const o of act) if(o.body.position.y>lead.body.position.y) lead=o;
    if(lead.idx!==lastLeader && finishOrder.length<labels.length){
      if(lastLeader!==-1 && Math.random()<0.6) say(`선두 교체! ${labels[lead.idx]} 치고 나갑니다 🏎️`);
      lastLeader=lead.idx;
    }
    camTarget=lead.body.position.y - VIS_H*0.42;
  }
  camTarget=Math.max(0,Math.min(course.H-VIS_H,camTarget));
  camY += (camTarget-camY)*0.12;

  updateParticles();
  render();

  if(finishOrder.length>=labels.length){ running=false; setTimeout(showResults,750); return; }
  raf=requestAnimationFrame(loop);
}

/* ===================== PARTICLES ===================== */
function burstConfetti(){
  for(let i=0;i<26;i++) confetti.push({x:VW/2+(Math.random()-.5)*160,y:VH*0.5,
    vx:(Math.random()-.5)*6,vy:-3-Math.random()*5,life:60+Math.random()*30,
    c:PALETTE[(Math.random()*PALETTE.length)|0],r:2+Math.random()*3,rot:Math.random()*6});
}
function updateParticles(){
  for(const s of sparks){ s.x+=s.vx; s.y+=s.vy; s.vy+=0.15; s.life--; }
  sparks=sparks.filter(s=>s.life>0);
  for(const c of confetti){ c.x+=c.vx; c.y+=c.vy; c.vy+=0.18; c.rot+=0.2; c.life--; }
  confetti=confetti.filter(c=>c.life>0);
  for(const f of floaters){ f.y-=0.5; f.life--; }
  floaters=floaters.filter(f=>f.life>0);
}

/* ===================== RENDER ===================== */
function seg(x1,y1,x2,y2,w,col){ ctx.strokeStyle=col; ctx.lineWidth=w; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
function shade(hex,amt){const n=parseInt(hex.slice(1),16);
  let r=Math.max(0,Math.min(255,(n>>16)+amt)),g=Math.max(0,Math.min(255,((n>>8)&255)+amt)),b=Math.max(0,Math.min(255,(n&255)+amt));
  return '#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');}

function render(){
  ctx.clearRect(0,0,VW,VH);
  ctx.save();
  ctx.scale(SCALE,SCALE);
  ctx.translate(0,-camY);

  // ramps
  for(const s of course.rampSegs){
    if(s[4]==='lip') seg(s[0],s[1],s[2],s[3],9,'#D9CCB2');
    else { seg(s[0],s[1],s[2],s[3],17,'#CBBB9C'); seg(s[0],s[1],s[2],s[3],9,'#E4D8BF'); }
  }
  // spinners
  for(const s of course.spinners){
    const b=s.b;
    ctx.save(); ctx.translate(b.cx,b.cy); ctx.rotate(s.ang);
    for(let i=0;i<3;i++){ ctx.save(); ctx.rotate((Math.PI*2/3)*i);
      ctx.fillStyle='#D97757'; ctx.beginPath();
      const arm=b.arm; ctx.roundRect? ctx.roundRect(-4.5,-arm/2,9,arm,4):ctx.rect(-4.5,-arm/2,9,arm);
      ctx.fill(); ctx.restore(); }
    ctx.fillStyle='#C15F3F'; ctx.beginPath(); ctx.arc(0,0,11,0,7); ctx.fill();
    ctx.fillStyle='#F7F3EA'; ctx.beginPath(); ctx.arc(0,0,4,0,7); ctx.fill();
    ctx.restore();
  }
  // finish line
  ctx.setLineDash([10,8]); seg(0,course.FINISH,WORLD_W,course.FINISH,3,'#C15F3F'); ctx.setLineDash([]);
  ctx.fillStyle='#C15F3F'; ctx.font='bold 15px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillText('🏁 FINISH', 12, course.FINISH-9);

  // world sparks
  for(const s of sparks){ ctx.globalAlpha=s.life/14; ctx.fillStyle=s.c;
    ctx.beginPath(); ctx.arc(s.x,s.y,1.6,0,7); ctx.fill(); } ctx.globalAlpha=1;

  // marbles
  for(const o of marbles){
    if(o.done) continue;
    const b=o.body,x=b.position.x,y=b.position.y,r=o.r,col=colors[o.idx];
    ctx.beginPath(); ctx.ellipse(x,y+r*0.85,r*0.8,r*0.32,0,0,7); ctx.fillStyle='rgba(46,42,36,.15)'; ctx.fill();
    const g=ctx.createRadialGradient(x-r*0.35,y-r*0.4,1,x,y,r);
    g.addColorStop(0,'#fff'); g.addColorStop(0.28,col); g.addColorStop(1,shade(col,-30));
    ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fillStyle=g; ctx.fill();
    ctx.lineWidth=1.4; ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.stroke();
    const lab=labels[o.idx];
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`800 ${lab.length>3?r*0.8:r*1.0}px sans-serif`;
    ctx.fillText(lab.length>4?lab.slice(0,4):lab,x,y+0.5);
  }
  // floaters (world space)
  for(const f of floaters){ ctx.globalAlpha=Math.min(1,f.life/30); ctx.fillStyle=f.c;
    ctx.font='800 20px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.strokeStyle='#fff'; ctx.lineWidth=4; ctx.strokeText(f.txt,f.x,f.y); ctx.fillText(f.txt,f.x,f.y); }
  ctx.globalAlpha=1; ctx.textBaseline='alphabetic';

  ctx.restore();

  drawHUD();
}

/* ===================== HUD (screen space) ===================== */
function drawHUD(){
  // ---- minimap strip (right) ----
  const mmW=26, mmX=VW-mmW-8, mmY=10, mmH=VH-150;
  const ms=mmH/course.H;
  ctx.fillStyle='rgba(255,255,255,.55)'; roundRect(mmX,mmY,mmW,mmH,8); ctx.fill();
  ctx.strokeStyle='rgba(46,42,36,.12)'; ctx.lineWidth=1; roundRect(mmX,mmY,mmW,mmH,8); ctx.stroke();
  // ramps
  ctx.strokeStyle='rgba(120,105,80,.35)'; ctx.lineWidth=1.4;
  for(const s of course.rampSegs){ if(s[4]==='lip')continue;
    ctx.beginPath(); ctx.moveTo(mmX+ (s[0]/course.W)*mmW, mmY+s[1]*ms); ctx.lineTo(mmX+(s[2]/course.W)*mmW, mmY+s[3]*ms); ctx.stroke(); }
  // camera viewport
  ctx.strokeStyle='rgba(217,119,87,.8)'; ctx.lineWidth=1.4;
  ctx.strokeRect(mmX+1, mmY+camY*ms, mmW-2, VIS_H*ms);
  // marble dots
  for(const o of marbles){ if(o.done)continue; const b=o.body;
    ctx.fillStyle=colors[o.idx]; ctx.beginPath();
    ctx.arc(mmX+(b.position.x/course.W)*mmW, mmY+b.position.y*ms, 2.4,0,7); ctx.fill(); }
  // finished marker at bottom
  ctx.fillStyle='#C15F3F'; ctx.beginPath();
  ctx.arc(mmX+mmW/2, mmY+course.FINISH*ms, 2, 0, 7); ctx.fill();

  // ---- live rank panel (top-left) ----
  const order=liveOrder();
  const rows=Math.min(order.length,6);
  const pw=150, ph=20+rows*20, px=10, py=10;
  ctx.fillStyle='rgba(46,42,36,.82)'; roundRect(px,py,pw,ph,12); ctx.fill();
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillStyle='#F7F3EA'; ctx.font='800 12px sans-serif';
  ctx.fillText('🏆 실시간 순위', px+12, py+13);
  for(let i=0;i<rows;i++){
    const o=order[i], yy=py+30+i*20;
    ctx.fillStyle=colors[o.idx]; ctx.beginPath(); ctx.arc(px+16,yy,5,0,7); ctx.fill();
    ctx.fillStyle=o.done?'#E4A951':'#F2EADB'; ctx.font=(i===0?'800':'600')+' 12px sans-serif';
    const nm=labels[o.idx].length>7?labels[o.idx].slice(0,7)+'…':labels[o.idx];
    ctx.fillText(`${i+1}. ${nm}`+(o.done?' ✅':''), px+28, yy);
  }

  // ---- commentary ticker (bottom) ----
  const cy0=VH-40, cw=VW-20;
  ctx.fillStyle='rgba(255,255,255,.85)'; roundRect(10,cy0,cw,32,12); ctx.fill();
  ctx.strokeStyle='rgba(46,42,36,.1)'; roundRect(10,cy0,cw,32,12); ctx.stroke();
  ctx.fillStyle='#5B8C7B'; ctx.font='800 13px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText('🎙️', 20, cy0+16);
  const last=commentary[commentary.length-1];
  ctx.fillStyle='#2E2A24'; ctx.font='600 13px sans-serif';
  if(last) ctx.fillText(clip(last.t, cw-46), 44, cy0+16);

  // ---- confetti (screen space) ----
  for(const c of confetti){ ctx.globalAlpha=Math.min(1,c.life/30); ctx.fillStyle=c.c;
    ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot); ctx.fillRect(-c.r,-c.r,c.r*2,c.r*2.6); ctx.restore(); }
  ctx.globalAlpha=1;

  // timer
  ctx.fillStyle='rgba(46,42,36,.55)'; ctx.font='700 12px sans-serif'; ctx.textAlign='right'; ctx.textBaseline='top';
  ctx.fillText(((performance.now()-startTime)/1000).toFixed(1)+'s', mmX-6, 14);
}
function liveOrder(){
  const fin=finishOrder.map(idx=>marbles.find(o=>o.idx===idx));
  const act=marbles.filter(o=>!o.done).sort((a,b)=>b.body.position.y-a.body.position.y);
  return fin.concat(act);
}
function roundRect(x,y,w,h,r){ ctx.beginPath();
  if(ctx.roundRect){ctx.roundRect(x,y,w,h,r);return;}
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function clip(t,maxw){ ctx.font='600 13px sans-serif'; if(ctx.measureText(t).width<=maxw)return t;
  while(t.length>1 && ctx.measureText(t+'…').width>maxw) t=t.slice(0,-1); return t+'…'; }

/* ===================== HUMOR ===================== */
const START_LINES=['자, 마블들이 출발선에 섰습니다! 🎬','운명의 레이스, 지금 시작합니다','아무도 예측 못 하는 승부… 출발!','중력에게 모든 걸 맡깁니다'];
const MID_LINES=['스피너에 얻어맞는 중 🌀','중력은 공평합니다','여기서 순위 다 뒤집힙니다','뒤엉킨 마블들, 아수라장'];
function arrivalLine(rank,total,name){
  if(rank===1) return pick([`🏁 ${name} 1등 골인! 밥 쏘세요`,`${name} 압도적 우승 👑`,`${name}, 로또도 사보세요`]);
  if(rank===total) return pick([`${name} 대망의 꼴찌 🐢 수고했어요`,`${name}, 설거지 당첨을 축하합니다 🍽️`,`${name} 마지막 주자, 오늘의 주인공(?)`]);
  if(rank===2) return pick([`${name} 아깝다! 은메달 🥈`,`${name}, 0.1초 차이의 한`]);
  if(rank===3) return pick([`${name} 동메달 획득 🥉`,`${name} 시상대 막차 탑승`]);
  return pick([`${name} ${rank}등으로 골인`,`${name}, 무난하게 ${rank}등`,`${name} 통과!`]);
}
function pick(a){return a[Math.floor(Math.random()*a.length)];}

/* ===================== RESULTS ===================== */
const FIRST=['오늘의 승자 👑 로또도 사보세요','압도적 1등! 실력이라 우기는 중','금메달 획득 🥇 밥은 이 사람이 삽니다','1등의 여유, 뒤를 안 돌아봤다'];
const SECOND=['아깝다! 0.1초 차이 😤','은메달도 훌륭합니다 🥈','1등 바로 뒤, 가장 배아픈 자리'];
const THIRD=['동메달 🥉 시상대 막차 탑승','3등도 시상대는 시상대다'];
const MID=['무난하게 중간, 인생 뭐 있나','치열했으나 결국 여기','아쉽게 놓친 시상대','존재감 있는 순위','조용히 제 갈 길 감','한 끗 차이의 미학','평타는 쳤다','드라마는 없었지만 성실했다'];
const LAST=['꼴찌의 품격 🐢 천천히 가도 도착은 함','설거지 당첨을 축하합니다 🍽️','늦게 온 게 아니라 대기만성형','마지막 주자, 오늘의 주인공(?)'];
function cmt(rank,total){ if(rank===1)return pick(FIRST); if(rank===total)return pick(LAST);
  if(rank===2)return pick(SECOND); if(rank===3)return pick(THIRD); return pick(MID); }
function medal(rank,total){ if(rank===1)return'🥇'; if(rank===2)return'🥈'; if(rank===3)return'🥉'; if(rank===total)return'🐢'; return rank+'등'; }
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function showResults(){
  const list=setupEl('rankList'); list.innerHTML='';
  const total=finishOrder.length, secs=((performance.now()-startTime)/1000).toFixed(1);
  finishOrder.forEach((idx,i)=>{
    const rank=i+1, div=document.createElement('div');
    div.className='rank'+(rank===1?' top1':''); div.style.animationDelay=(i*0.06)+'s';
    div.innerHTML=`<div class="medal">${medal(rank,total)}</div>
      <div class="swatch" style="background:${colors[idx]}"></div>
      <div class="body"><div class="who">${rank}등 · ${escapeHtml(labels[idx])}</div>
      <div class="cmt">${cmt(rank,total)}</div></div>`;
    list.appendChild(div);
  });
  setupEl('resSub').textContent=`🏆 ${labels[finishOrder[0]]} 님 우승! · ${total}명 · ${secs}초 레이스`;
  elResults.style.display='block';
  elResults.scrollIntoView({behavior:'smooth',block:'nearest'});
  tone(880,0.18,0.05,'triangle');
}

/* ===================== CONTROLS ===================== */
function again(){ start(); }
function reset(){ cancelAnimationFrame(raf); running=false;
  elStage.style.display='none'; elResults.style.display='none'; elSetup.style.display='block'; }
