<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinball Race — yourKey</title>
<style>
  :root{
    --pink:#FF2E97; --cyan:#16E0FF; --purple:#B14BFF; --green:#39FF14; --gold:#FFC21A; --orange:#FF6A00;
    --ink:#ECE4FF; --ink-soft:#A99FD0; --panel:rgba(16,8,32,.74); --line:rgba(177,75,255,.4);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    background:
      radial-gradient(circle at 12% 6%, rgba(255,46,151,.20), transparent 40%),
      radial-gradient(circle at 88% 12%, rgba(22,224,255,.16), transparent 40%),
      radial-gradient(circle at 50% 110%, rgba(177,75,255,.22), transparent 55%),
      #050208;
    color:var(--ink); min-height:100vh; display:flex; justify-content:center; padding:18px 12px 54px;
  }
  .wrap{width:100%;max-width:700px;margin:0 auto}
  .card,header,.foot{max-width:520px;margin-left:auto;margin-right:auto}
  header{text-align:center;margin-bottom:14px}
  h1{font-family:Georgia,"Times New Roman",serif;font-size:34px;margin:0;letter-spacing:2px;color:#fff;
    text-shadow:0 0 6px #fff,0 0 18px var(--pink),0 0 34px var(--pink),0 0 60px var(--pink);animation:flick 4s infinite}
  h1 .em{color:var(--cyan);text-shadow:0 0 6px #fff,0 0 18px var(--cyan),0 0 36px var(--cyan),0 0 64px var(--cyan)}
  @keyframes flick{0%,92%,100%{opacity:1}93%{opacity:.62}94%{opacity:1}96%{opacity:.7}97%{opacity:1}}
  .sub{color:var(--ink-soft);font-size:12.5px;margin-top:8px;letter-spacing:2px;text-transform:uppercase}
  .brand{display:block;height:30px;width:auto;margin:0 auto 12px;
    filter:drop-shadow(0 0 8px rgba(22,224,255,.75)) drop-shadow(0 0 18px rgba(255,46,151,.45))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;
    box-shadow:0 0 30px -6px rgba(177,75,255,.55),inset 0 0 0 1px rgba(255,255,255,.05);backdrop-filter:blur(8px)}
  .modes{display:flex;gap:8px;background:#0c0718;padding:5px;border-radius:12px;margin-bottom:14px;border:1px solid rgba(127,233,255,.18)}
  .modes button{flex:1;border:none;background:transparent;padding:10px 6px;border-radius:9px;font-size:14px;
    font-weight:800;color:var(--ink-soft);cursor:pointer;transition:.18s;line-height:1.25}
  .modes button.on{background:linear-gradient(180deg,var(--pink),var(--purple));color:#fff;box-shadow:0 0 18px -2px var(--pink)}
  .modes button small{font-weight:700;opacity:.8;font-size:11px}
  label.fld{display:block;font-size:12px;font-weight:800;color:var(--cyan);margin:0 0 6px 2px;letter-spacing:1.5px;text-transform:uppercase}
  input[type=number],textarea{width:100%;border:1.5px solid rgba(127,233,255,.3);border-radius:12px;padding:12px 14px;
    font-size:16px;font-family:inherit;background:#0b0718;color:#fff;resize:none}
  input:focus,textarea:focus{outline:none;border-color:var(--pink);box-shadow:0 0 16px -2px var(--pink)}
  .hint{font-size:12px;color:var(--ink-soft);margin:6px 2px 0}
  .row{display:flex;gap:10px;align-items:center;margin-top:14px}
  .go{flex:1;border:none;border-radius:14px;padding:15px;cursor:pointer;
    background:linear-gradient(180deg,var(--pink),var(--purple));color:#fff;font-size:17px;font-weight:900;
    letter-spacing:1px;box-shadow:0 0 28px -2px rgba(255,46,151,.85);text-shadow:0 0 12px rgba(255,255,255,.6);transition:.15s}
  .go:active{transform:translateY(1px)}
  .ghost{border:1.5px solid rgba(22,224,255,.5);background:#0b0718;color:var(--cyan);border-radius:14px;
    padding:15px 16px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 0 14px -4px var(--cyan)}
  #stage{display:none;margin-top:14px}
  .board-wrap{position:relative;border-radius:16px;overflow:hidden;border:1px solid rgba(22,224,255,.35);
    box-shadow:0 0 36px -8px rgba(22,224,255,.6),0 0 60px -20px rgba(255,46,151,.5);
    width:min(100%,56vh);margin:0 auto}
  canvas{display:block;width:100%;height:auto;background:#050208}
  #results{display:none;margin-top:16px}
  .res-head{text-align:center;margin-bottom:12px}
  .res-head h2{margin:0;font-family:Georgia,serif;font-size:24px;color:#fff;text-shadow:0 0 12px var(--gold),0 0 30px var(--gold)}
  .res-head p{margin:6px 0 0;color:var(--ink-soft);font-size:13px}
  .rank{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:13px;margin-bottom:8px;
    background:#100820;border:1px solid rgba(177,75,255,.3);animation:pop .38s cubic-bezier(.2,1.3,.4,1) both}
  @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.95)}to{opacity:1;transform:none}}
  .rank .medal{font-size:22px;width:38px;text-align:center;flex:none;font-weight:900}
  .rank .who{font-weight:900;font-size:16px;color:#fff}
  .rank .cmt{color:var(--ink-soft);font-size:12.5px;margin-top:1px}
  .rank .body{flex:1;min-width:0}
  .rank .swatch{width:13px;height:13px;border-radius:50%;flex:none;box-shadow:0 0 12px currentColor}
  .rank.top1{background:linear-gradient(90deg,rgba(255,194,26,.2),rgba(16,8,32,.6));border-color:var(--gold);box-shadow:0 0 22px -6px var(--gold)}
  .foot{text-align:center;margin-top:16px;color:var(--ink-soft);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img class="brand" src="yourkey-logo.png" alt="yourKey">
    <h1><span class="em">Pinball</span> Race</h1>
    <div class="sub">◆ 순서 정하기 · 마블 레이스 ◆</div>
  </header>

  <div class="card" id="setup">
    <div class="modes">
      <button id="mNum" class="on" onclick="setMode('num')">🔢 숫자 (인원수)</button>
      <button id="mName" onclick="setMode('name')">✍️ 이름 입력</button>
    </div>
    <div id="numPane">
      <label class="fld">몇 명 / 몇 개의 순서를 정할까요?</label>
      <input type="number" id="count" min="2" max="24" value="6">
      <div class="hint">2 ~ 24. 마블에 1번부터 번호가 붙어요.</div>
    </div>
    <div id="namePane" style="display:none">
      <label class="fld">이름을 줄바꿈으로 입력하세요</label>
      <textarea id="names" rows="5" placeholder="성준&#10;민지&#10;영수&#10;지훈"></textarea>
      <div class="hint">한 줄에 한 명. 2~24명까지.</div>
    </div>
    <div style="margin-top:16px">
      <label class="fld">레이스 길이</label>
      <div class="modes" id="durSel">
        <button data-sec="15" onclick="setDur(15)">⚡ 빠르게<br><small>~15초</small></button>
        <button data-sec="30" class="on" onclick="setDur(30)">🎯 보통<br><small>~30초</small></button>
        <button data-sec="60" onclick="setDur(60)">🍿 길게<br><small>~60초</small></button>
      </div>
    </div>
    <div class="row">
      <button class="go" id="startBtn" onclick="start()">▶ 레이스 시작!</button>
      <button class="ghost" id="soundBtn" onclick="toggleSound()">🔈 소리</button>
    </div>
  </div>

  <div id="stage">
    <div class="board-wrap">
      <canvas id="cv" width="920" height="1520"></canvas>
    </div>
    <div class="row"><button class="ghost" style="flex:1" onclick="reset()">⏹ 그만두고 설정으로</button></div>
  </div>

  <div id="results" class="card">
    <div class="res-head">
      <h2 id="resTitle">🏁 최종 순위</h2>
      <p id="resSub"></p>
    </div>
    <div id="rankList"></div>
    <div class="row">
      <button class="go" onclick="again()">🔁 한 번 더!</button>
      <button class="ghost" onclick="reset()">⚙️ 설정 바꾸기</button>
    </div>
  </div>

  <div class="foot">진짜 물리엔진(Matter.js) 기반 · 완전 무작위·완전 공정 · powered by <b style="color:#7FE9FF">yourKey</b></div>
</div>

<script src="matter.min.js"></script>
<script>
/* ===================== CONST ===================== */
const CV=document.getElementById('cv'), ctx=CV.getContext('2d');
const RES=2;                       // 2x backing store for retina crispness
const VW=CV.width/RES, VH=CV.height/RES;   // logical size (460 x 760)
const WORLD_W=560;
const SCALE=VW/WORLD_W;
const VIS_H=VH/SCALE;
const $=id=>document.getElementById(id);
const elSetup=$('setup'), elStage=$('stage'), elResults=$('results');
const elNumPane=$('numPane'), elNamePane=$('namePane'), elMNum=$('mNum'), elMName=$('mName');

let mode='num', soundOn=false, selectedSec=30;
let course=null, marbles=[], finishOrder=[], labels=[], colors=[], running=false, raf=null, startTime=0;
let camX=WORLD_W/2, camY=0, camZoom=1, camXT=WORLD_W/2, camYT=0, camZT=1, shakeMag=0, flash=0, zoomPunch=0;
let lcamX=WORLD_W/2, lcamY=0;
let sparks=[], confetti=[], commentary=[], lastLeader=-1, floaters=[];
const baseScale=SCALE;
let prevRank={}, rankCheck=0, lastCallout=0, finalRushSaid=false, tick=0;

const PALETTE=['#FF2E97','#16E0FF','#39FF14','#FFC21A','#B14BFF','#FF6A00','#00E0A4','#FF4D6D',
  '#4D9BFF','#E8FF3D','#FF61DC','#8CFF2E','#00D5FF','#FFA033','#C77DFF','#FF3B6B',
  '#5CE1E6','#FFD53D','#7CFFCB','#FF7AD9','#A0FF4D','#33C4FF','#FF9F1C','#D65DB1'];

/* starfield + chase-light border (generated once, screen space) */
const STARS=Array.from({length:46},()=>({x:Math.random()*VW,y:Math.random()*VH,r:Math.random()*1.4+0.3,p:Math.random()*6.28,s:Math.random()*0.05+0.02}));
const BORDER=(()=>{const a=[],sp=22,m=7;
  for(let x=m;x<VW-m;x+=sp)a.push({x,y:m});
  for(let y=m;y<VH-m;y+=sp)a.push({x:VW-m,y});
  for(let x=VW-m;x>m;x-=sp)a.push({x,y:VH-m});
  for(let y=VH-m;y>m;y-=sp)a.push({x:m,y});
  return a;})();
const BORDER_COLS=['#FF2E97','#16E0FF','#FFC21A','#39FF14','#B14BFF'];

function setDur(sec){ selectedSec=sec;
  document.querySelectorAll('#durSel button').forEach(b=>b.classList.toggle('on', +b.dataset.sec===sec)); }
function secToK(sec){ return Math.max(4, Math.min(40, Math.round((sec-2.9)/1.69))); }

/* ===================== INPUT ===================== */
function setMode(m){ mode=m;
  elMNum.classList.toggle('on',m==='num'); elMName.classList.toggle('on',m==='name');
  elNumPane.style.display=m==='num'?'':'none'; elNamePane.style.display=m==='name'?'':'none'; }
function getLabels(){
  if(mode==='num'){ let n=parseInt($('count').value,10); if(isNaN(n))n=0; n=Math.max(0,Math.min(24,n));
    return Array.from({length:n},(_,i)=>String(i+1)); }
  return $('names').value.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,24);
}

/* ===================== SOUND ===================== */
let actx=null, lastHit=0;
function toggleSound(){ soundOn=!soundOn; $('soundBtn').textContent=soundOn?'🔊 소리 ON':'🔈 소리';
  if(soundOn&&!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); }
function tone(f,d=0.05,v=0.04,type='sine'){ if(!soundOn||!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);
  o.start();g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+d);o.stop(actx.currentTime+d); }

/* ===================== COURSE (verified: 100% completion, incl. moving bars) ===================== */
function makeCourse(n,K){
  const M=Matter,{Engine,Composite,Bodies,Body}=M;
  const engine=Engine.create(); engine.gravity.y=1; engine.enableSleeping=false;
  const world=engine.world;
  const wo={isStatic:true,restitution:0.2,friction:0.02};
  const walls=[],pegs=[],bumpers=[],spinners=[],oscil=[],segs=[];
  function bar(x1,y1,x2,y2,th=15){const cx=(x1+x2)/2,cy=(y1+y2)/2,len=Math.hypot(x2-x1,y2-y1),ang=Math.atan2(y2-y1,x2-x1);
    walls.push(Bodies.rectangle(cx,cy,len,th,{...wo,angle:ang}));segs.push([x1,y1,x2,y2]);}
  function peg(x,y,r=7){pegs.push({x,y,r,ph:Math.random()*6.28});Composite.add(world,Bodies.circle(x,y,r,{isStatic:true,restitution:0.5,friction:0.02,label:'peg'}));}
  function pegField(y0,rows,cols,gapY){for(let r=0;r<rows;r++){const y=y0+r*gapY;const off=(r%2)?0.5:0;const span=WORLD_W-60;
    for(let c=0;c<=cols;c++){const x=30+(c+off)*(span/cols);if(x>20&&x<WORLD_W-20)peg(x,y);}}}
  function bumper(x,y,r=18){bumpers.push({x,y,r,hit:0,ph:Math.random()*6.28});Composite.add(world,Bodies.circle(x,y,r,{isStatic:true,restitution:1.25,friction:0.004,label:'bump'}));}
  function spinner(cx,cy,arm,sp,spokes=4){const ps=[];for(let i=0;i<spokes;i++){const a=(Math.PI*2/spokes)*i;ps.push(Bodies.rectangle(cx+Math.cos(a)*arm/2,cy+Math.sin(a)*arm/2,arm,9,{angle:a}));}
    ps.push(Bodies.circle(cx,cy,10));const b=Body.create({parts:ps,isStatic:true,restitution:0.55,friction:0.02});b.cx=cx;b.cy=cy;b.arm=arm;b.spokes=spokes;spinners.push({b,sp,ang:0});}
  function oscBar(cx,cy,len,amp,speed,phase){const b=Bodies.rectangle(cx,cy,len,14,{isStatic:true,restitution:0.5,friction:0.02,label:'osc'});
    Composite.add(world,b); oscil.push({b,cx,cy,len,amp,speed,phase:phase||0,x:cx});}

  let y=110;
  for(let k=0;k<K;k++){
    pegField(y,4,9,42); y+=4*42+34;
    const v=k%4;
    if(v===0){ spinner(160,y,110,0.07); spinner(400,y,110,-0.07); y+=140; }
    else if(v===1){ bumper(150,y); bumper(410,y); bumper(280,y+56,22); y+=150; }
    else if(v===2){ spinner(280,y,132,0.09,4); y+=150; }
    else { oscBar(280,y+10,150,90,0.05,k); y+=140; }
  }
  const finConv=y+30;
  bar(0,finConv-60,WORLD_W/2-95,finConv+20,15);
  bar(WORLD_W,finConv-60,WORLD_W/2+95,finConv+20,15);
  const FINISH=finConv+70;
  const H=FINISH+120;
  walls.push(Bodies.rectangle(-8,H/2,16,H*1.3,wo));
  walls.push(Bodies.rectangle(WORLD_W+8,H/2,16,H*1.3,wo));
  Composite.add(world,walls); Composite.add(world,spinners.map(s=>s.b));

  const R=n>16?10:(n>10?11:12);
  const mb=[];
  for(let i=0;i<n;i++){const body=Bodies.circle(40+Math.random()*(WORLD_W-80),20-(i%6)*30-Math.random()*20,R,
    {restitution:0.35,friction:0.02,frictionAir:0.005,density:0.002,label:'m'+i});body.idx=i;mb.push({body,idx:i,r:R,done:false,bestY:-1e9,noProg:0});}
  Composite.add(world,mb.map(o=>o.body));

  M.Events.on(engine,'collisionStart',ev=>{
    for(const p of ev.pairs){
      const a=p.bodyA,b=p.bodyB;
      const mv=(a.label&&a.label[0]==='m')?a:((b.label&&b.label[0]==='m')?b:null);
      const other=mv===a?b:a; if(!mv) continue;
      const v=Math.hypot(mv.velocity.x,mv.velocity.y);
      if(other.label==='bump'){
        const bm=bumpers.find(z=>Math.hypot(z.x-other.position.x,z.y-other.position.y)<2); if(bm)bm.hit=14;
        if(v>7)shakeMag=Math.max(shakeMag,3);
        for(let k=0;k<7;k++) sparks.push({x:mv.position.x,y:mv.position.y,vx:(Math.random()-.5)*6,vy:-Math.random()*5,life:20,c:'#FFE45C'});
        const now=performance.now(); if(now-lastHit>36){ tone(170+Math.random()*90,0.09,0.055,'square'); lastHit=now; }
      } else if(v>3){
        sparks.push({x:mv.position.x,y:mv.position.y,vx:(Math.random()-.5)*2.5,vy:-Math.random()*2.5,life:13,c:'#BFF6FF'});
        const now=performance.now(); if(now-lastHit>30){ tone(320+Math.random()*420,0.03,0.02); lastHit=now; }
      }
    }
  });
  return {engine,world,walls,pegs,bumpers,spinners,oscil,segs,marbles:mb,W:WORLD_W,H,FINISH,R};
}

/* ===================== START / LOOP ===================== */
function start(){
  labels=getLabels();
  if(labels.length<2){alert('최소 2명(개) 이상 입력해주세요 🙏');return;}
  colors=labels.map((_,i)=>PALETTE[i%PALETTE.length]);
  finishOrder=[]; sparks=[]; confetti=[]; floaters=[]; commentary=[]; lastLeader=-1;
  prevRank={}; rankCheck=0; lastCallout=0; finalRushSaid=false; tick=0;
  elSetup.style.display='none'; elResults.style.display='none'; elStage.style.display='block';
  course=makeCourse(labels.length, secToK(selectedSec)); marbles=course.marbles;
  camX=WORLD_W/2; camY=VIS_H*0.5; camZoom=1; camXT=camX; camYT=camY; camZT=1; shakeMag=0; flash=0; zoomPunch=0;
  lcamX=WORLD_W/2; lcamY=0;
  running=true; startTime=performance.now();
  say(pick(START_LINES));
  cancelAnimationFrame(raf); loop();
}
function say(msg){ commentary.push({t:msg,at:performance.now()}); if(commentary.length>4) commentary.shift(); }

function loop(){
  const M=Matter,{Engine,Body,Composite}=M; tick++;
  for(const s of course.spinners){ Body.rotate(s.b,s.sp); s.ang+=s.sp; }
  for(const o of course.oscil){ o.x=o.cx+o.amp*Math.sin(tick*o.speed+o.phase); Body.setPosition(o.b,{x:o.x,y:o.cy}); }
  Engine.update(course.engine,1000/60);
  for(const bm of course.bumpers) if(bm.hit>0) bm.hit--;

  for(const o of marbles){
    if(o.done) continue;
    const b=o.body;
    if(b.position.y>o.bestY+2){o.bestY=b.position.y;o.noProg=0;}
    else{o.noProg++; if(o.noProg>75){Body.setVelocity(b,{x:(Math.random()-0.5)*8,y:4+Math.random()*4});o.noProg=0;}}
    if(b.position.y>course.FINISH || b.position.y>course.H+160){
      o.done=true; finishOrder.push(o.idx);
      Composite.remove(course.world,b);
      const rank=finishOrder.length;
      floaters.push({txt:`${rank}등 ${labels[o.idx]}!`,x:b.position.x,y:course.FINISH-18,life:70,c:colors[o.idx]});
      burstConfetti(); tone(560+rank*24,0.12,0.05,'triangle');
      shakeMag=rank===1?16:9; zoomPunch+=rank===1?0.4:0.16; if(rank===1)flash=0.9;
      say(arrivalLine(rank,labels.length,labels[o.idx]));
    }
  }

  const act=marbles.filter(o=>!o.done);
  if(act.length){
    let lead=act[0]; for(const o of act) if(o.body.position.y>lead.body.position.y) lead=o;
    if(lead.idx!==lastLeader && finishOrder.length<labels.length){
      if(lastLeader!==-1 && Math.random()<0.55) say(`선두 교체! ${labels[lead.idx]} 치고 나갑니다 🏎️`);
      lastLeader=lead.idx;
    }
    // MAIN cam frames the BATTLE PACK (trim breakaway leader + lone straggler); 1st is on the PiP cam
    const ys=act.map(o=>o.body.position.y).sort((a,b)=>a-b);
    const xs=act.map(o=>o.body.position.x).sort((a,b)=>a-b);
    const q=p=>ys[Math.min(ys.length-1,Math.max(0,Math.round((ys.length-1)*p)))];
    const lo=q(0.15), hi=q(0.80);
    let spread=hi-lo; if(spread<90)spread=90;
    const desired=spread*1.5+300;
    camZT=Math.max(0.8, Math.min(1.7, VH/(baseScale*desired)));
    const visH=VH/(baseScale*camZoom);
    camXT = camZoom>1.2 ? xs[xs.length>>1] : WORLD_W/2;
    camYT = (lo+hi)/2 + 0.06*visH;
  }
  // ease cinematic camera
  zoomPunch*=0.9; flash*=0.9; shakeMag*=0.86;
  camZoom += ((camZT+zoomPunch)-camZoom)*0.06;
  camX += (camXT-camX)*0.10;
  camY += (camYT-camY)*0.11;
  const sc=baseScale*camZoom, hW=(VW/2)/sc, hH=(VH/2)/sc;
  if(hW>=WORLD_W/2) camX=WORLD_W/2; else camX=Math.max(hW,Math.min(camX,WORLD_W-hW));
  camY=Math.max(hH,Math.min(camY,Math.max(course.H-hH,hH)));
  detectUpsets();

  if(!finalRushSaid && labels.length>=4 && finishOrder.length===labels.length-2){
    say('마지막 2개! 결승선 앞 대혈투 🔥'); finalRushSaid=true;
  }

  updateParticles();
  render();

  if(finishOrder.length>=labels.length){ running=false; setTimeout(showResults,750); return; }
  raf=requestAnimationFrame(loop);
}

function detectUpsets(){
  rankCheck++; if(rankCheck<16) return; rankCheck=0;
  const order=liveOrder(); const now=performance.now(); const n=labels.length;
  const cur={}; order.forEach((o,i)=>cur[o.idx]=i);
  if(Object.keys(prevRank).length){
    for(const o of order){
      const before=prevRank[o.idx], after=cur[o.idx];
      if(before!==undefined && !o.done && before-after>=Math.max(3,Math.ceil(n/3)) && after<=2 && now-lastCallout>1400){
        say(pick(UPSET_LINES).replace('{n}',labels[o.idx])); lastCallout=now; break;
      }
    }
  }
  prevRank=cur;
}

/* ===================== PARTICLES ===================== */
function burstConfetti(){
  for(let i=0;i<34;i++) confetti.push({x:VW/2+(Math.random()-.5)*180,y:VH*0.5,
    vx:(Math.random()-.5)*8,vy:-3-Math.random()*7,life:64+Math.random()*34,
    c:PALETTE[(Math.random()*PALETTE.length)|0],r:2+Math.random()*3.2,rot:Math.random()*6});
}
function updateParticles(){
  for(const s of sparks){ s.x+=s.vx; s.y+=s.vy; s.vy+=0.15; s.life--; } sparks=sparks.filter(s=>s.life>0);
  for(const c of confetti){ c.x+=c.vx; c.y+=c.vy; c.vy+=0.18; c.rot+=0.2; c.life--; } confetti=confetti.filter(c=>c.life>0);
  for(const f of floaters){ f.y-=0.5; f.life--; } floaters=floaters.filter(f=>f.life>0);
}

/* ===================== RENDER ===================== */
function G(col,b){ ctx.shadowColor=col; ctx.shadowBlur=b; }
function noG(){ ctx.shadowBlur=0; ctx.shadowColor='transparent'; }
function seg(x1,y1,x2,y2,w,col){ ctx.strokeStyle=col; ctx.lineWidth=w; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }

function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,VH); g.addColorStop(0,'#120833'); g.addColorStop(.5,'#0a0420'); g.addColorStop(1,'#04010c');
  ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);
  // drifting color glows
  const t=tick*0.012;
  const blobs=[[VW*0.5+Math.sin(t)*90, VH*0.22+Math.cos(t*0.8)*40, 'rgba(255,46,151,0.20)'],
    [VW*0.2+Math.cos(t*1.1)*70, VH*0.6+Math.sin(t)*50, 'rgba(22,224,255,0.16)'],
    [VW*0.82+Math.sin(t*0.7)*60, VH*0.72+Math.cos(t)*40, 'rgba(177,75,255,0.18)']];
  for(const[bx,by,c] of blobs){ const rg=ctx.createRadialGradient(bx,by,0,bx,by,230);
    rg.addColorStop(0,c); rg.addColorStop(1,'transparent'); ctx.fillStyle=rg; ctx.fillRect(0,0,VW,VH); }
  // sweeping light beams
  ctx.save(); ctx.translate(VW/2,VH*0.3); ctx.globalCompositeOperation='lighter';
  for(let i=0;i<3;i++){ ctx.save(); ctx.rotate(Math.sin(tick*0.006+i*2)*0.6+i*2.1);
    const bg=ctx.createLinearGradient(0,0,0,VH); bg.addColorStop(0,'rgba(120,90,255,0.06)'); bg.addColorStop(1,'transparent');
    ctx.fillStyle=bg; ctx.fillRect(-16,0,32,VH); ctx.restore(); }
  ctx.restore();
  // stars
  for(const s of STARS){ const a=0.35+0.35*Math.sin(tick*s.s+s.p); ctx.globalAlpha=a;
    ctx.fillStyle='#dff'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill(); } ctx.globalAlpha=1;
}

function render(){
  ctx.setTransform(RES,0,0,RES,0,0);   // logical coords -> 2x backing
  drawBG();
  const scale=baseScale*camZoom;
  const shX=(Math.random()-.5)*shakeMag, shY=(Math.random()-.5)*shakeMag;
  ctx.save();
  ctx.translate(VW/2+shX, VH/2+shY); ctx.scale(scale,scale); ctx.translate(-camX,-camY);
  { const hH=(VH/2)/scale; drawScene(camY-hH-20, camY+hH+20); }
  ctx.restore();
  drawLeaderCam();
  drawHUD();
  drawBorder();
  drawScanlines();
  if(flash>0.02){ ctx.fillStyle='rgba(255,255,255,'+(flash*0.5).toFixed(3)+')'; ctx.fillRect(0,0,VW,VH); }
}

function drawScene(yTop,yBot){

  ctx.lineWidth=1; ctx.strokeStyle='rgba(90,225,255,.08)';
  const g0=Math.floor(yTop/70)*70; ctx.beginPath();
  for(let gx=0;gx<=WORLD_W;gx+=70){ ctx.moveTo(gx,yTop); ctx.lineTo(gx,yBot); }
  for(let gy=g0;gy<=yBot;gy+=70){ ctx.moveTo(0,gy); ctx.lineTo(WORLD_W,gy); }
  ctx.stroke();

  G('#16E0FF',10);
  for(const s of course.segs){ if(Math.max(s[1],s[3])<yTop||Math.min(s[1],s[3])>yBot)continue; seg(s[0],s[1],s[2],s[3],7,'#18E0FF'); }
  noG();
  // pegs (flashing glow)
  for(const p of course.pegs){ if(p.y<yTop||p.y>yBot)continue;
    const fl=0.6+0.4*Math.sin(tick*0.14+p.ph);
    const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r+6);
    gr.addColorStop(0,'#F2FEFF'); gr.addColorStop(.4,`rgba(90,225,255,${0.5+0.4*fl})`); gr.addColorStop(1,'rgba(90,225,255,0)');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(p.x,p.y,p.r+6,0,7); ctx.fill(); }
  // moving bars
  for(const o of course.oscil){ if(o.cy<yTop-30||o.cy>yBot+30)continue;
    G('#FF6A00',16); ctx.fillStyle='#FF8A2A';
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(o.x-o.len/2,o.cy-7,o.len,14,7);ctx.fill();}
    else ctx.fillRect(o.x-o.len/2,o.cy-7,o.len,14);
    noG(); ctx.fillStyle='#FFD08A'; ctx.fillRect(o.x-o.len/2+4,o.cy-2.5,o.len-8,2); }
  // bumpers (pop, idle + hit flash)
  for(const bm of course.bumpers){ if(bm.y<yTop||bm.y>yBot)continue;
    const idle=0.5+0.5*Math.sin(tick*0.1+bm.ph), pulse=bm.hit>0?1+bm.hit*0.03:1;
    const col=bm.hit>0?'#FFFFFF':'#FF2E97';
    G('#FF2E97',bm.hit>0?30:12+idle*10); ctx.strokeStyle=col; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(bm.x,bm.y,(bm.r+2)*pulse,0,7); ctx.stroke();
    ctx.lineWidth=2; ctx.strokeStyle='rgba(255,120,200,.7)'; ctx.beginPath(); ctx.arc(bm.x,bm.y,(bm.r+7)*pulse,0,7); ctx.stroke(); noG();
    ctx.fillStyle='#1a0620'; ctx.beginPath(); ctx.arc(bm.x,bm.y,bm.r-2,0,7); ctx.fill();
    G('#FFD53D',10+idle*8); ctx.fillStyle='#FFE45C'; ctx.beginPath(); ctx.arc(bm.x,bm.y,bm.r*0.36,0,7); ctx.fill(); noG(); }
  // spinners
  for(const s of course.spinners){ const b=s.b; if(b.cy<yTop-120||b.cy>yBot+120)continue;
    ctx.save(); ctx.translate(b.cx,b.cy); ctx.rotate(s.ang); G('#B14BFF',14);
    for(let i=0;i<b.spokes;i++){ ctx.save(); ctx.rotate((Math.PI*2/b.spokes)*i); ctx.fillStyle='#CE8CFF';
      if(ctx.roundRect){ctx.beginPath();ctx.roundRect(-4.5,-b.arm/2,9,b.arm,4);ctx.fill();} else ctx.fillRect(-4.5,-b.arm/2,9,b.arm);
      ctx.restore(); }
    noG(); ctx.fillStyle='#16E0FF'; ctx.beginPath(); ctx.arc(0,0,10,0,7); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,3.5,0,7); ctx.fill(); ctx.restore(); }
  // flippers + slingshots near finish
  drawFlippers(yTop,yBot);
  // finish
  G('#39FF14',16); ctx.setLineDash([12,9]); seg(0,course.FINISH,WORLD_W,course.FINISH,4,'#3BFF16'); ctx.setLineDash([]);
  ctx.fillStyle='#C4FFAE'; ctx.font='900 15px sans-serif'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillText('🏁 FINISH', 12, course.FINISH-10); noG();
  // sparks
  for(const s of sparks){ ctx.globalAlpha=Math.max(0,s.life/20); G(s.c,9); ctx.fillStyle=s.c;
    ctx.beginPath(); ctx.arc(s.x,s.y,2.1,0,7); ctx.fill(); } noG(); ctx.globalAlpha=1;
  // marbles (glow + speed streak)
  for(const o of marbles){ if(o.done)continue;
    const b=o.body,x=b.position.x,y=b.position.y,r=o.r,col=colors[o.idx];
    const sp=Math.hypot(b.velocity.x,b.velocity.y);
    if(sp>4){ ctx.globalAlpha=0.35; G(col,10); ctx.strokeStyle=col; ctx.lineWidth=r*1.4;
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-b.velocity.x*1.2,y-b.velocity.y*1.2); ctx.stroke(); noG(); ctx.globalAlpha=1; }
    G(col,16);
    const g=ctx.createRadialGradient(x-r*0.3,y-r*0.35,1,x,y,r);
    g.addColorStop(0,'#ffffff'); g.addColorStop(0.35,col); g.addColorStop(1,col);
    ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fillStyle=g; ctx.fill(); noG();
    ctx.lineWidth=1.4; ctx.strokeStyle='rgba(255,255,255,.9)'; ctx.stroke();
    const lab=labels[o.idx];
    ctx.fillStyle='#0a0416'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`900 ${lab.length>3?r*0.78:r*1.0}px sans-serif`;
    ctx.fillText(lab.length>4?lab.slice(0,4):lab,x,y+0.5); }
  // floaters
  for(const f of floaters){ ctx.globalAlpha=Math.min(1,f.life/30); G(f.c,14); ctx.fillStyle='#fff';
    ctx.font='900 21px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(f.txt,f.x,f.y); noG(); }
  ctx.globalAlpha=1; ctx.textBaseline='alphabetic';
}

function drawLeaderCam(){
  const act=marbles.filter(o=>!o.done);
  let leader=null;
  if(act.length){ leader=act[0]; for(const o of act) if(o.body.position.y>leader.body.position.y) leader=o; }
  if(leader){ lcamX+=(leader.body.position.x-lcamX)*0.22; lcamY+=(leader.body.position.y-lcamY)*0.22; }
  const pw=150, ph=118, px=VW-pw-8, py=10;
  ctx.save();
  ctx.fillStyle='#06010e'; roundRect(px,py,pw,ph,10); ctx.fill(); ctx.clip();
  if(leader){
    const s=ph/230;
    ctx.translate(px+pw/2, py+ph/2+9); ctx.scale(s,s); ctx.translate(-lcamX,-lcamY);
    const hH=(ph/2)/s;
    drawScene(lcamY-hH-20, lcamY+hH+20);
  }
  ctx.restore();
  ctx.fillStyle='rgba(6,1,14,.82)'; ctx.fillRect(px+1,py+1,pw-2,19);
  G('#FFC21A',7); ctx.fillStyle='#FFD53D'; ctx.font='900 11px monospace'; ctx.textAlign='left'; ctx.textBaseline='middle';
  const nm=leader?labels[leader.idx]:(finishOrder.length?labels[finishOrder[0]]:'-');
  ctx.fillText('🥇 1위  '+(nm.length>8?nm.slice(0,8)+'…':nm), px+8, py+11); noG();
  G('#FFC21A',9); ctx.strokeStyle='#FFD53D'; ctx.lineWidth=1.6; roundRect(px,py,pw,ph,10); ctx.stroke(); noG();
  ctx.textBaseline='alphabetic';
}

function drawFlippers(yTop,yBot){
  const fy=course.FINISH-40; if(fy<yTop-60||fy>yBot+60) return;
  const swing=Math.sin(tick*0.22)*0.5;
  // slingshots (flashing triangles)
  const sf=0.5+0.5*Math.sin(tick*0.2);
  for(const[sx,dir] of [[WORLD_W/2-120,1],[WORLD_W/2+120,-1]]){
    G('#FFC21A',8+sf*10); ctx.fillStyle=`rgba(255,210,60,${0.7})`;
    ctx.beginPath(); ctx.moveTo(sx,fy-70); ctx.lineTo(sx+dir*38,fy-40); ctx.lineTo(sx,fy-24); ctx.closePath(); ctx.fill(); noG();
  }
  // flippers
  for(const[fx,dir] of [[WORLD_W/2-78,1],[WORLD_W/2+78,-1]]){
    ctx.save(); ctx.translate(fx,fy); ctx.rotate(dir*(0.35+swing*dir*0+swing)*(dir>0?1:1));
    ctx.rotate(dir<0?Math.PI:0);
    G('#16E0FF',14); ctx.fillStyle='#39C9FF';
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(-6,-11,74,22,11);ctx.fill();} else ctx.fillRect(-6,-11,74,22);
    noG(); ctx.fillStyle='#BEEBFF'; ctx.beginPath(); ctx.arc(0,0,7,0,7); ctx.fill(); ctx.restore();
  }
}

/* ===================== HUD ===================== */
function panel(x,y,w,h,r,accent){ ctx.fillStyle='rgba(8,4,18,.85)'; roundRect(x,y,w,h,r); ctx.fill();
  G(accent,10); ctx.strokeStyle=accent; ctx.lineWidth=1.2; roundRect(x,y,w,h,r); ctx.stroke(); noG(); }
function drawHUD(){
  const mmW=24, mmX=VW-mmW-8, mmY=136, mmH=VH-186, ms=mmH/course.H;
  panel(mmX,mmY,mmW,mmH,8,'#16E0FF');
  ctx.fillStyle='rgba(90,225,255,.5)';
  for(const p of course.pegs){ ctx.fillRect(mmX+(p.x/course.W)*mmW-0.4, mmY+p.y*ms-0.4, .9,.9); }
  ctx.fillStyle='#FF2E97';
  for(const bm of course.bumpers){ ctx.beginPath(); ctx.arc(mmX+(bm.x/course.W)*mmW, mmY+bm.y*ms,1.4,0,7); ctx.fill(); }
  const vhH=(VH)/(baseScale*camZoom);
  G('#FFE45C',6); ctx.strokeStyle='#FFE45C'; ctx.lineWidth=1.3; ctx.strokeRect(mmX+1, mmY+(camY-vhH/2)*ms, mmW-2, vhH*ms); noG();
  for(const o of marbles){ if(o.done)continue; const b=o.body;
    ctx.fillStyle=colors[o.idx]; ctx.beginPath(); ctx.arc(mmX+(b.position.x/course.W)*mmW, mmY+b.position.y*ms,2,0,7); ctx.fill(); }
  G('#39FF14',6); ctx.strokeStyle='#39FF14'; ctx.lineWidth=1.6; ctx.beginPath();
  ctx.moveTo(mmX+2,mmY+course.FINISH*ms); ctx.lineTo(mmX+mmW-2,mmY+course.FINISH*ms); ctx.stroke(); noG();

  const order=liveOrder(), rows=Math.min(order.length,6);
  const pw=152, ph=22+rows*20, px=10, py=10;
  panel(px,py,pw,ph,10,'#B14BFF');
  ctx.textAlign='left'; ctx.textBaseline='middle';
  G('#FFC21A',8); ctx.fillStyle='#FFD53D'; ctx.font='900 12px monospace'; ctx.fillText('◆ LIVE RANK', px+12, py+14); noG();
  for(let i=0;i<rows;i++){ const o=order[i], yy=py+32+i*20;
    G(colors[o.idx],7); ctx.fillStyle=colors[o.idx]; ctx.beginPath(); ctx.arc(px+16,yy,4.5,0,7); ctx.fill(); noG();
    ctx.fillStyle=o.done?'#FFD53D':'#EFE7FF'; ctx.font=(i===0?'900':'700')+' 12px monospace';
    const nm=labels[o.idx].length>7?labels[o.idx].slice(0,7)+'…':labels[o.idx];
    ctx.fillText(`${i+1}. ${nm}`+(o.done?' ✓':''), px+28, yy); }

  // DMD ticker
  const cy0=VH-40, cw=VW-20;
  ctx.fillStyle='#0a0400'; roundRect(10,cy0,cw,32,10); ctx.fill();
  G('#FF6A00',8); ctx.strokeStyle='#FF8A2A'; ctx.lineWidth=1.2; roundRect(10,cy0,cw,32,10); ctx.stroke(); noG();
  G('#FFB020',7); ctx.fillStyle='#FFC24A'; ctx.font='900 13px monospace'; ctx.textAlign='left'; ctx.textBaseline='middle';
  const last=commentary[commentary.length-1];
  if(last) ctx.fillText('▸ '+clip(last.t, cw-30), 20, cy0+16); noG();

  for(const c of confetti){ ctx.globalAlpha=Math.min(1,c.life/30); G(c.c,6); ctx.fillStyle=c.c;
    ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot); ctx.fillRect(-c.r,-c.r,c.r*2,c.r*2.6); ctx.restore(); } noG();
  ctx.globalAlpha=1;

  G('#FF2E97',6); ctx.fillStyle='#FF7AD9'; ctx.font='900 14px monospace'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(((performance.now()-startTime)/1000).toFixed(1)+'s', 230, 14); noG();
}

function drawBorder(){
  const head=(tick*0.6)%BORDER.length;
  for(let i=0;i<BORDER.length;i++){ const b=BORDER[i];
    let d=Math.abs(i-head); d=Math.min(d,BORDER.length-d);
    const lit=d<3.5;
    if(lit){ const col=BORDER_COLS[(Math.floor(tick*0.05)+i)%BORDER_COLS.length];
      G(col,10); ctx.fillStyle=col; ctx.beginPath(); ctx.arc(b.x,b.y,2.6,0,7); ctx.fill(); noG(); }
    else { ctx.fillStyle='rgba(255,255,255,.14)'; ctx.beginPath(); ctx.arc(b.x,b.y,1.5,0,7); ctx.fill(); }
  }
}
function drawScanlines(){
  ctx.fillStyle='rgba(0,0,0,.16)';
  for(let y=0;y<VH;y+=3) ctx.fillRect(0,y,VW,1);
}

function liveOrder(){
  const fin=finishOrder.map(idx=>marbles.find(o=>o.idx===idx));
  const act=marbles.filter(o=>!o.done).sort((a,b)=>b.body.position.y-a.body.position.y);
  return fin.concat(act);
}
function roundRect(x,y,w,h,r){ ctx.beginPath();
  if(ctx.roundRect){ctx.roundRect(x,y,w,h,r);return;}
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath(); }
function clip(t,maxw){ ctx.font='900 13px monospace'; if(ctx.measureText(t).width<=maxw)return t;
  while(t.length>1 && ctx.measureText(t+'…').width>maxw) t=t.slice(0,-1); return t+'…'; }

/* ===================== HUMOR ===================== */
const START_LINES=['자, 마블들이 출발선에 섰습니다! 🎬','운명의 레이스, 지금 시작합니다','아무도 예측 못 하는 승부… 출발!','중력에게 모든 걸 맡깁니다'];
const UPSET_LINES=['대역전! {n} 뒤에서 치고 올라온다 🚀','{n} 폭풍 추격, 순위 뒤집혔어요!','이게 되네?! {n} 대약진','{n} 스피너 타고 순삭 점프 ⚡','{n} 밑바닥에서 상위권으로!'];
function arrivalLine(rank,total,name){
  if(rank===1) return pick([`🏁 ${name} 1등 골인! 밥 쏘세요`,`${name} 압도적 우승 👑`,`${name}, 로또도 사보세요`]);
  if(rank===total) return pick([`${name} 대망의 꼴찌 🐢 수고했어요`,`${name}, 설거지 당첨 🍽️`,`${name} 마지막 주자, 오늘의 주인공(?)`]);
  if(rank===2) return pick([`${name} 아깝다! 은메달 🥈`,`${name}, 0.1초 차이의 한`]);
  if(rank===3) return pick([`${name} 동메달 획득 🥉`,`${name} 시상대 막차 탑승`]);
  return pick([`${name} ${rank}등으로 골인`,`${name}, 무난하게 ${rank}등`,`${name} 통과!`]);
}
function pick(a){return a[Math.floor(Math.random()*a.length)];}

/* ===================== RESULTS ===================== */
const FIRST=['오늘의 승자 👑 로또도 사보세요','압도적 1등! 실력이라 우기는 중','금메달 획득 🥇 밥은 이 사람이 삽니다','1등의 여유, 뒤를 안 돌아봤다'];
const SECOND=['아깝다! 0.1초 차이 😤','은메달도 훌륭합니다 🥈','1등 바로 뒤, 가장 배아픈 자리'];
const THIRD=['동메달 🥉 시상대 막차 탑승','3등도 시상대는 시상대다'];
const MID=['무난하게 중간, 인생 뭐 있나','치열했으나 결국 여기','아쉽게 놓친 시상대','존재감 있는 순위','조용히 제 갈 길 감','한 끗 차이의 미학','평타는 쳤다','드라마는 없었지만 성실했다'];
const LAST=['꼴찌의 품격 🐢 천천히 가도 도착은 함','설거지 당첨을 축하합니다 🍽️','늦게 온 게 아니라 대기만성형','마지막 주자, 오늘의 주인공(?)'];
function cmt(rank,total){ if(rank===1)return pick(FIRST); if(rank===total)return pick(LAST);
  if(rank===2)return pick(SECOND); if(rank===3)return pick(THIRD); return pick(MID); }
function medal(rank,total){ if(rank===1)return'🥇'; if(rank===2)return'🥈'; if(rank===3)return'🥉'; if(rank===total)return'🐢'; return rank+'등'; }
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function showResults(){
  const list=$('rankList'); list.innerHTML='';
  const total=finishOrder.length, secs=((performance.now()-startTime)/1000).toFixed(1);
  finishOrder.forEach((idx,i)=>{ const rank=i+1, div=document.createElement('div');
    div.className='rank'+(rank===1?' top1':''); div.style.animationDelay=(i*0.06)+'s';
    div.innerHTML=`<div class="medal">${medal(rank,total)}</div>
      <div class="swatch" style="background:${colors[idx]};color:${colors[idx]}"></div>
      <div class="body"><div class="who">${rank}등 · ${escapeHtml(labels[idx])}</div>
      <div class="cmt">${cmt(rank,total)}</div></div>`;
    list.appendChild(div); });
  $('resSub').textContent=`🏆 ${labels[finishOrder[0]]} 님 우승! · ${total}명 · ${secs}초 레이스`;
  elResults.style.display='block'; elResults.scrollIntoView({behavior:'smooth',block:'nearest'});
  tone(880,0.18,0.05,'triangle');
}

/* ===================== CONTROLS ===================== */
function again(){ start(); }
function reset(){ cancelAnimationFrame(raf); running=false;
  elStage.style.display='none'; elResults.style.display='none'; elSetup.style.display='block'; }
</script>
